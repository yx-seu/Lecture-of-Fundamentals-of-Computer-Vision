project_name: imagenet_s_animals_10cls_trainval_holdout_ade
seed: 42

data:
  root: ./data/imagenet-s/ImageNetS50
  dataset: imagenet_s
  train_split: train
  test_split: validation
  num_classes: 10
  class_names:
    - n01443537  # goldfish
    - n01491361  # tiger shark
    - n01531178  # goldfinch
    - n01644373  # lizard
    - n02104029  # dog
    - n02119022  # red fox
    - n02123597  # Siamese cat
    - n02690373  # airliner
    - n02342885  # hamster
    - n02504458  # African elephant
  mask_mode: multiclass
  samples_per_class_train: null
  samples_per_class_val: null
  use_validation_for_train: true
  validation_holdout_per_class: 1
  validation_holdout_stems:
    n02123597: ILSVRC2012_val_00025887
  image_size: 256
  ignore_index: 255
  num_workers: 0
  pin_memory: false

model:
  name: ./models/segformer-b0-ade
  use_own_segformer: true
  num_labels: 11
  id2label:
    0: background
  label2id:
    background: 0

loss:
  use_class_weights: true
  background_weight: 0.7
  foreground_weight: 1.3
  ce_weight: 1.0
  dice_weight: 0.5

train:
  device: cpu
  epochs: 30
  batch_size: 4
  learning_rate: 0.00003
  weight_decay: 0.01
  amp: false
  grad_clip_norm: 1.0
  save_every: 5
  eval_every: 1

output:
  root: ./outputs/imagenet_s_animals_10cls_trainval_holdout_ade
  save_best_metric: miou
