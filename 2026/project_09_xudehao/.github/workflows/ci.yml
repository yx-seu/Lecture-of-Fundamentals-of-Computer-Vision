name: tests-and-benchmark

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run dependency-free benchmark smoke test
        run: python scripts/run_benchmark.py --fake --frames 20 --warmup 2 --output-dir outputs/benchmarks
      - name: Build benchmark HTML
        run: python scripts/visualize_benchmark.py outputs/benchmarks/benchmark_latest.json --output outputs/benchmarks/report.html
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: outputs/benchmarks

