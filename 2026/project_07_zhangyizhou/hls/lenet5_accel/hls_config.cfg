# ============================================================
# Vitis HLS Configuration for LeNet-5 Accelerator
# Target: xc7z010clg400-1 (Zynq-7010)
# ============================================================

[common]
part=xc7z010clg400-1
clock=10.0
flow_target=vitis
package.output.format=ip_catalog
package.output.name=lenet5_accel

[hls]
top=lenet5_accel
csim=1
csynth=1
cosim=1
export=1

[csim]
code_analyzer=1

[csynth]
clock_uncertainty=0.5

[cosim]
tool=xsim
trace_level=all

[export]
format=ip_catalog
